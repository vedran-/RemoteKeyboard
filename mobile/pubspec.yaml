name: remote_keyboard_mobile
description: RemoteKeyboard Mobile App - Control your PC from your phone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  web_socket_channel: ^2.4.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utilities
  uuid: ^4.2.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
