# ============================================================================
# Release Pipeline - Create Releases with Build Artifacts
# ============================================================================
# This workflow creates GitHub Releases with downloadable build artifacts.
# Triggered by git tags (e.g., v1.0.0)
# 
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write  # Required to create releases

jobs:
  # --------------------------------------------------------------------------
  # Build PC Server (Windows)
  # --------------------------------------------------------------------------
  build-pc-server:
    name: Build PC Server (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: x86_64-pc-windows-msvc

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: pc

    - name: Build PC Server (Release)
      run: |
        cd pc
        cargo build --release --verbose

    - name: Rename PC Server executable
      run: |
        $version = "${{ github.ref_name }}"  # e.g., v1.0.0
        $source = "pc\target\release\remote_keyboard_pc.exe"
        $dest = "pc\target\release\RemoteKeyboard-Server-${version}.exe"
        Copy-Item $source $dest
        Write-Host "Renamed to: RemoteKeyboard-Server-${version}.exe"

    - name: Upload PC Server artifact
      uses: actions/upload-artifact@v4
      with:
        name: pc-server
        path: pc/target/release/RemoteKeyboard-Server-*.exe
        retention-days: 30

  # --------------------------------------------------------------------------
  # Build Mobile Windows Client
  # --------------------------------------------------------------------------
  build-mobile-windows:
    name: Build Mobile Client (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop

    - name: Get Dependencies
      run: |
        cd mobile
        flutter pub get

    - name: Build Mobile Windows Client (Release)
      run: |
        cd mobile
        flutter build windows --release --verbose

    - name: Rename Mobile Windows executable
      run: |
        $version = "${{ github.ref_name }}"  # e.g., v1.0.0
        $source = "mobile\build\windows\x64\runner\Release\remote_keyboard_mobile.exe"
        $dest = "mobile\build\windows\x64\runner\Release\RemoteKeyboard-Client-${version}.exe"
        Copy-Item $source $dest
        Write-Host "Renamed to: RemoteKeyboard-Client-${version}.exe"

    - name: Copy flutter_windows.dll
      run: |
        $flutterDll = "mobile\build\windows\x64\runner\Release\flutter_windows.dll"
        if (Test-Path $flutterDll) {
          Copy-Item $flutterDll "mobile\build\windows\x64\runner\Release\flutter_windows.dll"
          Write-Host "Copied flutter_windows.dll"
        } else {
          Write-Host "flutter_windows.dll not found, searching..."
          Get-ChildItem -Path mobile\build -Recurse -Filter flutter_windows.dll | ForEach-Object {
            Write-Host "Found: $($_.FullName)"
          }
        }

    - name: Upload Mobile Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: mobile-windows
        path: |
          mobile/build/windows/x64/runner/Release/RemoteKeyboard-Client-*.exe
          mobile/build/windows/x64/runner/Release/flutter_windows.dll
        retention-days: 30

  # --------------------------------------------------------------------------
  # Create GitHub Release
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-pc-server, build-mobile-windows]
    
    steps:
    - name: Download PC Server artifact
      uses: actions/download-artifact@v4
      with:
        name: pc-server
        path: ./artifacts/pc-server

    - name: Download Mobile Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: mobile-windows
        path: ./artifacts/mobile-windows

    - name: List artifacts
      run: |
        echo "## Artifacts to upload:"
        ls -la ./artifacts/pc-server/
        ls -la ./artifacts/mobile-windows/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: true  # Set to false for auto-publish
        prerelease: false
        generate_release_notes: true
        files: |
          ./artifacts/pc-server/RemoteKeyboard-Server-*.exe
          ./artifacts/mobile-windows/RemoteKeyboard-Client-*.exe
          ./artifacts/mobile-windows/flutter_windows.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
