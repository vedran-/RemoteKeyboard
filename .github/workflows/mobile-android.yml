# ============================================================================
# Mobile Android Build Pipeline
# ============================================================================
# This workflow builds the Android APK for releases.
# Triggered by git tags (v*.*.*) or manually from Actions tab.
# 
# Usage (automatic):
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Usage (manual):
#   Go to Actions tab → "Mobile Android Build" → "Run workflow"
# ============================================================================

name: Mobile Android Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required to create releases

jobs:
  # --------------------------------------------------------------------------
  # Build Android APK
  # --------------------------------------------------------------------------
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true

    - name: Get Dependencies
      run: |
        cd mobile
        flutter pub get

    - name: Build Android APK (Release)
      run: |
        cd mobile
        flutter build apk --release --split-per-abi

    - name: List APK outputs
      run: |
        echo "## Built APKs:"
        ls -lh mobile/build/app/outputs/flutter-apk/*.apk

    - name: Rename APKs with version
      run: |
        VERSION="${{ github.ref_name }}"  # e.g., v1.0.0
        cd mobile/build/app/outputs/flutter-apk
        
        # Rename universal APK
        if [ -f app-release.apk ]; then
          cp app-release.apk RemoteKeyboard-Client-${VERSION}.apk
          echo "Created: RemoteKeyboard-Client-${VERSION}.apk"
        fi
        
        # Rename ARM64 APK (most common)
        if [ -f app-arm64-v8a-release.apk ]; then
          cp app-arm64-v8a-release.apk RemoteKeyboard-Client-${VERSION}-arm64.apk
          echo "Created: RemoteKeyboard-Client-${VERSION}-arm64.apk"
        fi
        
        # Rename ARMv7 APK
        if [ -f app-armeabi-v7a-release.apk ]; then
          cp app-armeabi-v7a-release.apk RemoteKeyboard-Client-${VERSION}-armv7.apk
          echo "Created: RemoteKeyboard-Client-${VERSION}-armv7.apk"
        fi

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: mobile/build/app/outputs/flutter-apk/RemoteKeyboard-Client-*.apk
        retention-days: 30

  # --------------------------------------------------------------------------
  # Create/Update GitHub Release with APKs
  # --------------------------------------------------------------------------
  upload-to-release:
    name: Upload APKs to Release
    runs-on: ubuntu-latest
    needs: build-android-apk
    if: github.event_name == 'push'  # Only auto-upload for tag pushes
    
    steps:
    - name: Download Android APKs
      uses: actions/download-artifact@v4
      with:
        name: android-apks
        path: ./artifacts/android

    - name: List APKs to upload
      run: |
        echo "## APKs to upload:"
        ls -lh ./artifacts/android/

    - name: Upload APKs to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: true
        prerelease: false
        generate_release_notes: true
        files: ./artifacts/android/RemoteKeyboard-Client-*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
