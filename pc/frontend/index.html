<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteKeyboard PC</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
        }
        .status {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .icon {
            font-size: 4em;
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⌨️</div>
        <h1>RemoteKeyboard PC</h1>
        <p class="status">Server running... Check system tray for status</p>
    </div>
</body>
</html>
